<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHIP Patient Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">SHIP</div>
      <nav>
        <a href="patient-admin.html" class="active">Dashboard</a>
        <a href="doctor-admin.html">Doctors</a>
        <a href="billing-admin.html">Billing</a>
        <a href="chat.html?role=patient">Chat</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Patient Dashboard</h1>
          <p id="patientGreeting">Welcome</p>
        </div>
        <button id="logoutBtn">Logout</button>
      </header>

      <section class="stats">
        <div class="card"><h3>Total Patients</h3><p id="patientCount">0</p></div>
        <div class="card"><h3>My Bills</h3><p id="patientBillsCount">0</p></div>
        <div class="card"><h3>Messages</h3><p id="patientChatsCount">0</p></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Patients List</h2>
          <input id="patientSearch" type="text" placeholder="Search patient..." />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>DOB</th>
                <th>Address</th>
              </tr>
            </thead>
            <tbody id="patientTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/patient-admin.js"></script>
</body>
</html>
