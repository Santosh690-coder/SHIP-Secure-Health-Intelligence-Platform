<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Logout page for Secure Health Platform." />
  <meta name="theme-color" content="#0f4c81" />
  <title>Logout | Secure Health Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/notifications.css" />
  <style>
    .logout-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f4f8fb 0%, #eaf2f8 100%);
      padding: 2rem;
    }

    .logout-card {
      width: min(100%, 520px);
      background: #fff;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 18px 45px rgba(15, 76, 129, 0.12);
      border: 1px solid rgba(15, 76, 129, 0.08);
      text-align: center;
    }

    .logout-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      text-decoration: none;
      color: inherit;
    }

    .logout-brand .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #0f4c81;
      color: #fff;
      font-weight: 800;
    }

    .logout-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <main class="logout-shell">
    <section class="logout-card" aria-labelledby="logoutTitle">
      <a href="index.html" class="logout-brand" aria-label="Secure Health Platform home">
        <span class="brand-mark">S</span>
        <span>
          <strong>Secure Health</strong><br />
          <small>Patient & Doctor Portal</small>
        </span>
      </a>

      <h1 id="logoutTitle">You have been signed out</h1>
      <p>Your session has been ended successfully. For your privacy and security, please close this browser tab if you are using a shared device.</p>

      <div class="logout-actions">
        <a class="btn btn-primary" href="login.html">Go to Login</a>
        <a class="btn btn-ghost" href="index.html">Back to Home</a>
      </div>
    </section>
  </main>

  <script src="js/session.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      try {
        window.SHIPSession?.logout?.();
      } catch (error) {
        console.error(error);
      }
    });
  </script>
</body>
</html>
